services:
  - type: web
    name: iitm-call-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn caller.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: TTS_VOICE
        value: Polly.Aditi
      - key: SPEECH_LANGUAGE
        value: en-IN
      - key: MAX_TURNS
        value: "12"
